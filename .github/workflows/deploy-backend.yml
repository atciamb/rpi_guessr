name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

  # App config (passed to EC2)
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  APP_AWS_ACCESS_KEY_ID: ${{ secrets.APP_AWS_ACCESS_KEY_ID }}
  APP_AWS_SECRET_ACCESS_KEY: ${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build server
        working-directory: ./backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o rpi-guessr-server .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: backend/rpi-guessr-server

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifacts to S3
        working-directory: ./backend
        run: |
          aws s3 cp rpi-guessr-server s3://${{ env.DEPLOY_BUCKET }}/rpi-guessr/rpi-guessr-server
          aws s3 cp rpi-guessr.service s3://${{ env.DEPLOY_BUCKET }}/rpi-guessr/rpi-guessr.service
          aws s3 cp init.sql s3://${{ env.DEPLOY_BUCKET }}/rpi-guessr/init.sql

      - name: Create env file
        run: |
          cat > /tmp/app.env << 'EOF'
          DATABASE_URL=${{ env.DATABASE_URL }}
          S3_BUCKET=${{ env.S3_BUCKET }}
          S3_REGION=${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ env.APP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ env.APP_AWS_SECRET_ACCESS_KEY }}
          PORT=8080
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/app.env
          aws s3 cp /tmp/app.env s3://${{ env.DEPLOY_BUCKET }}/rpi-guessr/app.env

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "set -e",
              "aws s3 cp s3://'"${{ env.DEPLOY_BUCKET }}"'/rpi-guessr/rpi-guessr-server /opt/rpi-guessr/rpi-guessr-server",
              "aws s3 cp s3://'"${{ env.DEPLOY_BUCKET }}"'/rpi-guessr/rpi-guessr.service /etc/systemd/system/rpi-guessr.service",
              "aws s3 cp s3://'"${{ env.DEPLOY_BUCKET }}"'/rpi-guessr/init.sql /tmp/init.sql",
              "aws s3 cp s3://'"${{ env.DEPLOY_BUCKET }}"'/rpi-guessr/app.env /opt/rpi-guessr/.env",
              "chmod +x /opt/rpi-guessr/rpi-guessr-server",
              "chmod 600 /opt/rpi-guessr/.env",
              "chown rpi-guessr:rpi-guessr /opt/rpi-guessr/.env /opt/rpi-guessr/rpi-guessr-server",
              "psql \"'"${{ env.DATABASE_URL }}"'\" -f /tmp/init.sql || true",
              "rm /tmp/init.sql",
              "systemctl daemon-reload",
              "systemctl enable rpi-guessr",
              "systemctl restart rpi-guessr",
              "echo Deployment complete"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          echo "Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "Deployment status: $RESULT"

          if [ "$RESULT" != "Success" ]; then
            echo "Deployment failed. Getting logs..."
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}"
            exit 1
          fi
